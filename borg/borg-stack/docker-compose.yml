name: borg

networks:
  proxynet:
    external: true

services:

  # ── Monitoring ──────────────────────────────────────────────────────────────

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/henrygd/beszel/main/internal/site/public/static/icon.png"
    environment:
      PORT: 45876
      KEY: "${BESZEL_AGENT_KEY}"
    volumes:
      - /mnt/user/appdata/beszel-agent:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - SYS_PTRACE
      - NET_ADMIN

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/selfhosters/unRAID-CA-templates/master/templates/img/dozzle.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8484]/"
    environment:
      TZ: America/Chicago
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/disks/appdataAndDocker/appdata/dozzle:/data
    ports:
      - "8484:8080"

