services:
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped

    # Use host networking for simplest setup
    network_mode: host

    environment:
      # Port for SSH communication (agent listens, hub connects)
      PORT: 45876

      # SSH public key from Beszel web UI (set in .env file)
      KEY: "${BESZEL_AGENT_KEY}"

    volumes:
      # Beszel agent data storage
      - /mnt/disks/appdataAndDocker/appdata/beszel-agent:/var/lib/beszel-agent

      # Docker socket (read-only) - monitor Unraid containers
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Host filesystem (read-only) - monitor system resources
      - /:/host:ro

    # Security hardening
    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    cap_add:
      - CHOWN          # File ownership changes
      - SETGID         # Group ID changes
      - SETUID         # User ID changes
      - DAC_OVERRIDE   # File permission overrides
      - SYS_PTRACE     # Read process info
      - NET_ADMIN      # Read network stats

  # Paperless-ngx - Document management system
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    env_file:
      - ./paperless/.env
    depends_on:
      - paperless-postgres
      - paperless-redis
      - paperless-gotenberg
      - paperless-tika
    ports:
      - "8000:8000"
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/data:/usr/src/paperless/data
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/media:/usr/src/paperless/media
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/export:/usr/src/paperless/export
      - /mnt/user/Documents/consume:/usr/src/paperless/consume

  # PostgreSQL database for paperless-ngx
  paperless-postgres:
    image: postgres:16
    container_name: paperless-postgres
    restart: unless-stopped
    env_file:
      - ./postgres/.env
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/postgres:/var/lib/postgresql/data

  # Redis cache for paperless-ngx
  paperless-redis:
    image: docker.io/library/redis:7
    container_name: paperless-redis
    restart: unless-stopped
    env_file:
      - ./redis/.env
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/redis:/data

  # Gotenberg - Document conversion service
  paperless-gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: unless-stopped
    env_file:
      - ./gotenberg/.env
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  # Tika - Text extraction service
  paperless-tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-tika
    restart: unless-stopped
    env_file:
      - ./tika/.env

  # Ollama - Local LLM inference with GPU support
  paperless-ollama:
    image: ollama/ollama:latest
    container_name: paperless-ollama
    restart: unless-stopped
    env_file:
      - ./ollama/.env
    ports:
      - "11434:11434"
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-a0c637a6-a078-71e5-ffba-72dd70ee8933']
              capabilities: [gpu]

  # Open WebUI - Manage Ollama models
  paperless-open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: paperless-open-webui
    restart: unless-stopped
    env_file:
      - ./open-webui/.env
    depends_on:
      - paperless-ollama
    ports:
      - "3001:8080"
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/open-webui:/app/backend/data

  # Paperless-AI - Automatic metadata suggestions
  paperless-ai:
    image: clusterzx/paperless-ai:latest
    container_name: paperless-ai
    restart: unless-stopped
    env_file:
      - ./paperless-ai/.env
    depends_on:
      - paperless-ngx
      - paperless-ollama
    ports:
      - "3000:3000"
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/paperless-ai:/app/data

  # Paperless-GPT - Vision OCR and metadata
  paperless-gpt:
    image: icereed/paperless-gpt:latest
    container_name: paperless-gpt
    restart: unless-stopped
    env_file:
      - ./paperless-gpt/.env
    depends_on:
      - paperless-ngx
      - paperless-ollama
    ports:
      - "3002:8080"
    volumes:
      - /mnt/disks/appdataAndDocker/appdata/paperless-ngx/paperless-gpt/prompts:/app/prompts
