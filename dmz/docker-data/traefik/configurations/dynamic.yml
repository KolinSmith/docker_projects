http:
  routers:
    it-tools:
      entryPoints:
        - websecure
      rule: "Host(`tools.hiddenba.se`)"
      service: it-tools
      tls:
        certResolver: cloudflare

  services:
    it-tools:
      loadBalancer:
        servers:
          - url: "http://100.72.103.67:8765"

  middlewares:
    secureHeaders:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000

    user-auth:
      basicAuth:
        users:
          - "dax:$2y$10$IXxbcKXGwwOiUW/u94atOObkcqogg2zlnlQrxGKlawSXgRtsCBJUO"
          # generated htpasswd via https://htpassword.com/ password is test


tls:
  options:
    default:
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      minVersion: VersionTLS12
