name: Build CI image

on:
  push:
    branches:
      - master
    paths:
      - 'ci-images/ci-tools/**'
  workflow_dispatch:

jobs:
  build:
    name: Build and push ci-tools image
    runs-on: linux
    container:
      image: 100.86.4.29:3001/dax/ci-tools:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        env:
          FORGEJO_USER: ${{ secrets.FORGEJO_USER }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          # Docker socket is provided via runner automount (docker_host: automount in runner config).
          # Push via Tailscale direct endpoint to bypass Traefik.
          # Traefik returns 413 on large blob uploads; Forgejo accepts them fine directly.
          echo "${FORGEJO_TOKEN}" | docker login 100.86.4.29:3001 \
            -u "${FORGEJO_USER}" --password-stdin
          docker build -t 100.86.4.29:3001/dax/ci-tools:latest \
            ci-images/ci-tools/
          docker push 100.86.4.29:3001/dax/ci-tools:latest
