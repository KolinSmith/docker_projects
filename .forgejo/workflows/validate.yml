name: Validate

on:
  push:
  pull_request:

jobs:
  yaml-lint:
    name: Lint docker-compose files
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache nodejs yamllint git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint all docker-compose.yml files
        run: |
          find . -name "docker-compose.yml" | sort | while read f; do
            echo "Checking $f..."
            yamllint -d '{extends: default, rules: {line-length: disable, comments: disable, truthy: disable, new-lines: disable, document-start: disable}}' "$f" || exit 1
          done
          echo "All compose files passed."

  secrets-scan:
    name: Scan for secrets
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache curl git nodejs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_arm64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --verbose --no-git
