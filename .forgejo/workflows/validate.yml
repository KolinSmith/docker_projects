name: Validate

on:
  push:
    branches-ignore:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  yaml-lint:
    name: Lint docker-compose files
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache nodejs yamllint git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint all docker-compose.yml files
        id: lint
        run: |
          output=$(find . -name "docker-compose.yml" | sort | while read f; do
            echo "Checking $f..."
            yamllint -d '{extends: default, rules: {line-length: disable, comments: disable, truthy: disable, new-lines: disable, document-start: disable}}' "$f" 2>&1 || true
          done)
          echo "$output"
          if echo "$output" | grep -q "error"; then
            echo "LINT_OUTPUT<<EOF" >> $GITHUB_OUTPUT
            echo "$output" | grep "error" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Comment on PR (lint failure)
        if: failure() && github.event_name == 'pull_request'
        run: |
          curl -s -X POST "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":\"❌ **yaml-lint failed**\n\`\`\`\n${{ steps.lint.outputs.LINT_OUTPUT }}\n\`\`\`\"}"

  secrets-scan:
    name: Scan for secrets
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache git nodejs gitleaks

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        id: scan
        run: |
          output=$(gitleaks detect --source . --no-git 2>&1) || {
            echo "$output"
            echo "SCAN_OUTPUT<<EOF" >> $GITHUB_OUTPUT
            echo "$output" | grep -E "Finding:|File:|RuleID:" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          }

      - name: Comment on PR (secrets failure)
        if: failure() && github.event_name == 'pull_request'
        run: |
          curl -s -X POST "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":\"🔐 **Secrets scan failed — potential secrets detected:**\n\`\`\`\n${{ steps.scan.outputs.SCAN_OUTPUT }}\n\`\`\`\"}"
