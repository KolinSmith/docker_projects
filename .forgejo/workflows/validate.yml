name: Validate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  yaml-lint:
    name: Lint YAML
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache yamllint git nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint changed YAML files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(yml|yaml)$' \
            | grep -vE '^(\.forgejo/|_deprecated/)' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "No YAML files changed, skipping."
            exit 0
          fi
          echo "$CHANGED" | while read -r f; do
            echo "Checking $f..."
            yamllint -d '{extends: default, rules: {
              line-length: disable,
              comments: disable,
              comments-indentation: disable,
              truthy: disable,
              new-lines: disable,
              new-line-at-end-of-file: disable,
              document-start: disable,
              indentation: disable,
              trailing-spaces: disable,
              braces: disable,
              empty-lines: disable,
              colons: disable
            }}' "$f" || exit 1
          done

  checkov:
    name: Checkov IaC scan
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache python-3 py3-pip git nodejs

      - name: Install checkov
        run: pip install --quiet --root-user-action=ignore checkov

      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(yml|yaml)$' \
            | grep -vE '^(\.forgejo/|_deprecated/)' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "No files to scan, skipping."
            exit 0
          fi
          checkov -d . --framework docker_compose --quiet --compact

  secrets-scan:
    name: Scan for secrets
    runs-on: linux
    container:
      image: cgr.dev/chainguard/wolfi-base:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache git nodejs gitleaks

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan PR commits for secrets
        run: |
          git fetch origin ${{ github.base_ref }}
          gitleaks detect --source . --config .gitleaks.toml \
            --log-opts "origin/${{ github.base_ref }}..HEAD"
          echo "No secrets detected in PR commits."
